<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Add New Student</h2>
        <form id="add-student-form">
            <div class="input-group">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name" placeholder="Enter first name" required>
            </div>
            
            <div class="input-group">
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name" placeholder="Enter last name" required>
            </div>
            
            <div class="input-group">
                <label for="student-id">Student ID</label>
                <input type="text" id="student-id" name="student-id" placeholder="Enter student ID" required>
            </div>
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter email address" required>
            </div>
            
            <div class="input-group">
                <label for="phone-number">Phone Number</label>
                <input type="tel" id="phone-number" name="phone-number" placeholder="Enter phone number" required>
            </div>
            
            <div class="input-group">
                <label for="date-of-birth">Date of Birth</label>
                <input type="date" id="date-of-birth" name="date-of-birth" required>
            </div>
            
            <div class="input-group">
                <label for="grade-level">Grade Level</label>
                <select id="grade-level" name="grade-level" required>
                    <option value="" disabled selected>Select grade level</option>
                    <option value="1">1st Grade</option>
                    <option value="2">2nd Grade</option>
                    <option value="3">3rd Grade</option>
                    <option value="4">4th Grade</option>
                    <option value="5">5th Grade</option>
                    </select>
            </div>
            
            <div class="input-group">
                <label for="major">Major / Area of Study</label>
                <input type="text" id="major" name="major" placeholder="Enter major/study area" required>
            </div>
            
            <button type="submit" class="submit-btn">Add Student</button>
        </form>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
